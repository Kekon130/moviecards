name: CI

on: push

jobs:
  build:
    runs-on: ubuntu—latest
    steps:
      - name: Download Repository
        uses: actions/checkout@v2

      - name: Install JDK v11
        uses: actions/setup-java@v2
        with:
          java-version: "11"
          distribution: "adopt"

      - name: Build using Maven
        run: mvn clean package -SskipTests

      - name: Save generated package for later deployment
        uses: actions/upload-artifact@v4
        with:
          name: movierecords-java
          path: "${{ github.workspace }}/target/*.jar"
        
  test:
    needs: build
    runs-on: ubuntu—latest
    steps :
      - name: pruebas
        run: echo "pruebas"

  qa:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: calidad
        run: echo "calidad"

  deploy:
    needs: qa
    runs-on: ubuntu-latest
    steps:
      - name: despliegue
        run : "echo despliegue"